<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <rect width="800" height="150" fill="#0a0a0a"/>
  <defs>
    <pattern id="sl" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#000" opacity="0.4"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="150" fill="url(#sl)"/>

  <!-- glow halo -->
  <g filter="url(#glow)" font-family="'Courier New',Courier,monospace" font-size="13.5" fill="#4af09a">
    <animate attributeName="opacity" values="0.3;0.9;0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
    <text x="112" y="46"  xml:space="preserve"> ____             _  __ _      _         </text>
    <text x="112" y="62"  xml:space="preserve">|  _ \ __ _  __ _(_)/ _(_) ___(_) __ _  </text>
    <text x="112" y="78"  xml:space="preserve">| |_) / _` |/ _` | | |_| |/ __| |/ _` | </text>
    <text x="112" y="94"  xml:space="preserve">|  __/ (_| | (_| | |  _| | (__| | (_| |  </text>
    <text x="112" y="110" xml:space="preserve">|_|   \__,_|\__,_|_|_| |_|\___|_|\__,_|  </text>
  </g>

  <!-- solid text -->
  <g filter="url(#glow-soft)" font-family="'Courier New',Courier,monospace" font-size="13.5" fill="#4af09a">
    <animate attributeName="opacity" values="0.75;1;0.75;1;0.75" dur="4s" repeatCount="indefinite"/>
    <text x="112" y="46"  xml:space="preserve"> ____             _  __ _      _         </text>
    <text x="112" y="62"  xml:space="preserve">|  _ \ __ _  __ _(_)/ _(_) ___(_) __ _  </text>
    <text x="112" y="78"  xml:space="preserve">| |_) / _` |/ _` | | |_| |/ __| |/ _` | </text>
    <text x="112" y="94"  xml:space="preserve">|  __/ (_| | (_| | |  _| | (__| | (_| |  </text>
    <text x="112" y="110" xml:space="preserve">|_|   \__,_|\__,_|_|_| |_|\___|_|\__,_|  </text>
  </g>

  <!-- tagline -->
  <text x="114" y="136" font-family="'Courier New',Courier,monospace" font-size="11" fill="#444" letter-spacing="4">a companion, not a tool</text>

  <!-- cursor blink -->
  <rect x="698" y="123" width="8" height="13" fill="#4af09a">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
